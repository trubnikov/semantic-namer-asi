<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 16px; margin: 0; background: #f5f5f5; }
        h3 { margin: 0 0 6px; font-size: 10px; text-transform: uppercase; color: #999; letter-spacing: 0.6px; }
        select, input { width: 100%; padding: 7px 9px; border-radius: 5px; border: 1px solid #ddd; font-size: 13px; background: #fff; }
        .section { margin-bottom: 12px; }
        .row { display: flex; gap: 6px; }
        .row input, .row select { flex: 1; }
        .btn { padding: 7px 12px; border-radius: 5px; border: none; font-size: 13px; cursor: pointer; color: white; }
        .btn-primary { background: #0d99ff; width: 100%; margin-top: 10px; }
        .btn-primary:hover { background: #007be5; }
        .btn-secondary { background: #666; white-space: nowrap; }
        .btn-secondary:hover { background: #444; }
        .btn:disabled { background: #bbb; cursor: not-allowed; }
        #status { margin-top: 10px; font-size: 11px; color: #666; min-height: 16px; }

        /* Provider tabs */
        .tabs { display: flex; gap: 0; margin-bottom: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .tab { flex: 1; padding: 7px; border: none; background: #fff; font-size: 13px; cursor: pointer; color: #555; }
        .tab.active { background: #0d99ff; color: white; font-weight: 500; }
    </style>
</head>
<body>

    <div class="section">
        <h3>AI Provider</h3>
        <div class="tabs">
            <button class="tab active" id="tabGroq" onclick="switchProvider('groq')">Groq</button>
            <button class="tab" id="tabAnthropic" onclick="switchProvider('anthropic')">Claude (Anthropic)</button>
        </div>
    </div>

    <div class="section">
        <h3 id="keyLabel">Groq API Key</h3>
        <div class="row">
            <input type="password" id="apiKey" placeholder="gsk_..." />
            <button class="btn btn-secondary" id="saveKeyBtn">Save</button>
        </div>
    </div>

    <div class="section">
        <h3>Model</h3>
        <div class="row">
            <select id="modelSelect"><option value="">Loading...</option></select>
            <button class="btn btn-secondary" id="saveModelBtn">Save</button>
        </div>
    </div>

    <div class="section">
        <h3>Target Platform</h3>
        <select id="platform">
            <option value="iOS (SwiftUI)">iOS (SwiftUI)</option>
            <option value="Android (XML/Compose)">Android (XML/Compose)</option>
            <option value="Web (BEM)">Web (BEM)</option>
            <option value="Flutter">Flutter</option>
        </select>
    </div>

    <button class="btn btn-primary" id="renameBtn">Rename Layers</button>
    <p id="status">Select provider, enter API key and choose a frame.</p>

    <script>
        let currentProvider = 'groq';
        const keys = { groq: '', anthropic: '' };
        const selectedModels = { groq: '', anthropic: '' };
        const ANTHROPIC_MODELS = ['claude-opus-4-7', 'claude-sonnet-4-6', 'claude-haiku-4-5-20251001'];

        const $ = id => document.getElementById(id);

        function switchProvider(provider) {
            keys[currentProvider] = $('apiKey').value.trim();
            currentProvider = provider;
            $('tabGroq').classList.toggle('active', provider === 'groq');
            $('tabAnthropic').classList.toggle('active', provider === 'anthropic');
            $('keyLabel').textContent = provider === 'groq' ? 'Groq API Key' : 'Anthropic API Key';
            $('apiKey').placeholder = provider === 'groq' ? 'gsk_...' : 'sk-ant-...';
            $('apiKey').value = keys[provider];
            updateModelDropdown();
            parent.postMessage({ pluginMessage: { type: 'save-provider', provider } }, '*');
        }

        function updateModelDropdown() {
            const select = $('modelSelect');
            if (currentProvider === 'anthropic') {
                select.innerHTML = ANTHROPIC_MODELS
                    .map(m => `<option value="${m}">${m}</option>`).join('');
                if (selectedModels.anthropic) select.value = selectedModels.anthropic;
            } else {
                select.innerHTML = '<option value="">Enter API key & Save to load</option>';
            }
        }

        function loadGroqModels() {
            const key = $('apiKey').value.trim();
            if (!key || currentProvider !== 'groq') return;
            $('modelSelect').innerHTML = '<option value="">Loading models...</option>';
            parent.postMessage({ pluginMessage: { type: 'fetch-groq-models', key } }, '*');
        }

        $('saveKeyBtn').onclick = () => {
            const key = $('apiKey').value.trim();
            if (!key) return;
            keys[currentProvider] = key;
            parent.postMessage({ pluginMessage: { type: 'save-api-key', provider: currentProvider, key } }, '*');
            if (currentProvider === 'groq') loadGroqModels();
        };

        $('saveModelBtn').onclick = () => {
            const model = $('modelSelect').value;
            if (!model) return;
            selectedModels[currentProvider] = model;
            parent.postMessage({ pluginMessage: { type: 'save-model', provider: currentProvider, model } }, '*');
        };

        $('renameBtn').onclick = () => {
            parent.postMessage({ pluginMessage: {
                type: 'rename-layers',
                provider: currentProvider,
                key: $('apiKey').value.trim(),
                model: $('modelSelect').value,
                platform: $('platform').value
            }}, '*');
        };

        window.onmessage = (event) => {
            const msg = event.data.pluginMessage;
            if (!msg) return;

            if (msg.type === 'load-settings') {
                currentProvider = msg.provider || 'groq';
                keys.groq = msg.groqKey || '';
                keys.anthropic = msg.anthropicKey || '';
                selectedModels.groq = msg.groqModel || '';
                selectedModels.anthropic = msg.anthropicModel || ANTHROPIC_MODELS[0];

                $('tabGroq').classList.toggle('active', currentProvider === 'groq');
                $('tabAnthropic').classList.toggle('active', currentProvider === 'anthropic');
                $('keyLabel').textContent = currentProvider === 'groq' ? 'Groq API Key' : 'Anthropic API Key';
                $('apiKey').placeholder = currentProvider === 'groq' ? 'gsk_...' : 'sk-ant-...';
                $('apiKey').value = keys[currentProvider];

                if (currentProvider === 'anthropic') {
                    updateModelDropdown();
                } else if (msg.groqModels && msg.groqModels.length > 0) {
                    $('modelSelect').innerHTML = msg.groqModels
                        .map(m => `<option value="${m}">${m}</option>`).join('');
                    if (selectedModels.groq) $('modelSelect').value = selectedModels.groq;
                } else {
                    $('modelSelect').innerHTML = '<option value="">Enter API key & Save to load</option>';
                }
            }

            if (msg.type === 'groq-models-loaded') {
                if (msg.models && msg.models.length > 0) {
                    $('modelSelect').innerHTML = msg.models
                        .map(m => `<option value="${m}">${m}</option>`).join('');
                    if (selectedModels.groq) $('modelSelect').value = selectedModels.groq;
                    $('status').textContent = `Loaded ${msg.models.length} Groq models.`;
                } else {
                    $('modelSelect').innerHTML = '<option value="">No models found</option>';
                    $('status').textContent = 'Error: Could not load models. Check API key.';
                }
            }

            if (msg.type === 'status-update') {
                $('status').textContent = msg.text;
            }
        };
    </script>
</body>
</html>
