<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 16px; margin: 0; background-color: #f5f5f5; }
        h3 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 0.5px; }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 14px; box-sizing: border-box; background-color: #0d99ff; color: white; margin-top: 12px; cursor: pointer; }
        button:hover { background-color: #007be5; }
        button:disabled { background-color: #b0b0b0; cursor: not-allowed; }
        .section { margin-bottom: 14px; }
        .row { display: flex; gap: 8px; }
        .row input, .row select { flex: 1; margin: 0; }
        .save-btn { width: auto; margin-top: 0; padding: 8px 14px; background-color: #555; }
        .save-btn:hover { background-color: #333; }
        .save-btn:disabled { background-color: #b0b0b0; }
        #status { margin-top: 12px; font-size: 12px; color: #555; }
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="section">
        <h3>Groq API Key</h3>
        <div class="row">
            <input type="password" id="apiKey" placeholder="gsk_..." />
            <button class="save-btn" id="saveKeyBtn">Save</button>
        </div>
    </div>
    <div class="section">
        <h3>Groq Model</h3>
        <div class="row">
            <select id="groqModel">
                <option value="">Loading models...</option>
            </select>
            <button class="save-btn" id="saveModelBtn" disabled>Save</button>
        </div>
    </div>
    <div class="section">
        <h3>Target Platform</h3>
        <select id="platform">
            <option value="iOS (SwiftUI)">iOS (SwiftUI)</option>
            <option value="Android (XML/Compose)">Android (XML/Compose)</option>
            <option value="Web (BEM)">Web (BEM)</option>
            <option value="Flutter">Flutter</option>
        </select>
    </div>
    <button id="renameBtn">Rename Layers</button>
    <p id="status">Enter API key to load available models.</p>

    <script>
        const renameBtn = document.getElementById('renameBtn');
        const platformSelect = document.getElementById('platform');
        const statusLabel = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');
        const groqModelSelect = document.getElementById('groqModel');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const saveModelBtn = document.getElementById('saveModelBtn');

        const loadModels = () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                groqModelSelect.innerHTML = '<option value="">Enter API key to load models</option>';
                saveModelBtn.disabled = true;
                return;
            }
            groqModelSelect.innerHTML = '<option value="">Loading models...</option>';
            saveModelBtn.disabled = true;
            parent.postMessage({ pluginMessage: { type: 'fetch-models', key } }, '*');
        };

        saveKeyBtn.onclick = () => {
            const key = apiKeyInput.value.trim();
            if (!key) return;
            parent.postMessage({ pluginMessage: { type: 'save-api-key', key } }, '*');
            loadModels();
        };

        saveModelBtn.onclick = () => {
            const model = groqModelSelect.value;
            if (!model) return;
            parent.postMessage({ pluginMessage: { type: 'save-model', model } }, '*');
        };

        renameBtn.onclick = () => {
            const platform = platformSelect.value;
            const key = apiKeyInput.value.trim();
            const model = groqModelSelect.value;
            statusLabel.textContent = 'Extracting layer tree...';
            parent.postMessage({ pluginMessage: { type: 'rename-layers', platform, key, model } }, '*');
        };

        window.onmessage = (event) => {
            const message = event.data.pluginMessage;
            if (!message) return;
            if (message.type === 'status-update') {
                statusLabel.textContent = message.text;
            } else if (message.type === 'load-settings') {
                if (message.key) apiKeyInput.value = message.key;
                if (message.availableModels && message.availableModels.length > 0) {
                    groqModelSelect.innerHTML = message.availableModels
                        .map(m => `<option value="${m}">${m}</option>`)
                        .join('');
                    if (message.model) groqModelSelect.value = message.model;
                    saveModelBtn.disabled = false;
                } else if (message.key) {
                    loadModels();
                }
            } else if (message.type === 'models-loaded') {
                if (message.models && message.models.length > 0) {
                    groqModelSelect.innerHTML = message.models
                        .map(m => `<option value="${m}">${m}</option>`)
                        .join('');
                    saveModelBtn.disabled = false;
                    statusLabel.textContent = `Loaded ${message.models.length} models.`;
                } else {
                    groqModelSelect.innerHTML = '<option value="">No models available</option>';
                    statusLabel.textContent = 'Error: Could not load models. Check your API key.';
                }
            }
        };
    </script>
</body>
</html>
