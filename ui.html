<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 16px; margin: 0; background-color: #f5f5f5; }
        h3 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 0.5px; }
        select, input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; border-radius: 4px; border: none; font-size: 14px; box-sizing: border-box; background-color: #0d99ff; color: white; margin-top: 12px; cursor: pointer; }
        button:hover { background-color: #007be5; }
        button:disabled { background-color: #b0b0b0; cursor: not-allowed; }
        .section { margin-bottom: 14px; }
        .row { display: flex; gap: 8px; }
        .row input { flex: 1; }
        .save-btn { width: auto; margin-top: 0; padding: 8px 14px; background-color: #555; }
        .save-btn:hover { background-color: #333; }
        #status { margin-top: 12px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="section">
        <h3>Groq API Key</h3>
        <div class="row">
            <input type="password" id="apiKey" placeholder="gsk_..." />
            <button class="save-btn" id="saveKeyBtn">Save</button>
        </div>
    </div>
    <div class="section">
        <h3>Target Platform</h3>
        <select id="platform">
            <option value="iOS (SwiftUI)">iOS (SwiftUI)</option>
            <option value="Android (XML/Compose)">Android (XML/Compose)</option>
            <option value="Web (BEM)">Web (BEM)</option>
            <option value="Flutter">Flutter</option>
        </select>
    </div>
    <button id="renameBtn">Rename Layers</button>
    <p id="status">Enter API key, select a frame and click rename.</p>

    <script>
        const renameBtn = document.getElementById('renameBtn');
        const platformSelect = document.getElementById('platform');
        const statusLabel = document.getElementById('status');
        const apiKeyInput = document.getElementById('apiKey');
        const saveKeyBtn = document.getElementById('saveKeyBtn');

        saveKeyBtn.onclick = () => {
            const key = apiKeyInput.value.trim();
            if (!key) return;
            parent.postMessage({ pluginMessage: { type: 'save-api-key', key } }, '*');
        };

        renameBtn.onclick = () => {
            const platform = platformSelect.value;
            const key = apiKeyInput.value.trim();
            statusLabel.textContent = 'Extracting layer tree...';
            parent.postMessage({ pluginMessage: { type: 'rename-layers', platform, key } }, '*');
        };

        window.onmessage = (event) => {
            const message = event.data.pluginMessage;
            if (!message) return;
            if (message.type === 'status-update') {
                statusLabel.textContent = message.text;
            } else if (message.type === 'load-api-key' && message.key) {
                apiKeyInput.value = message.key;
            }
        };
    </script>
</body>
</html>
